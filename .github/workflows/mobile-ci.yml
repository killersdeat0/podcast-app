name: Mobile CI

on:
  pull_request:
    paths:
      - 'mobile/**'

jobs:
  android-tests:
    name: Android Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('mobile/gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Write local.properties
        env:
          SUPABASE_URL: ${{ secrets.SYNCPODS_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SYNCPODS_SUPABASE_ANON_KEY }}
          GWC_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          PROD_URL: ${{ secrets.SYNCPODS_PROD_SUPABASE_URL }}
          PROD_KEY: ${{ secrets.SYNCPODS_PROD_SUPABASE_ANON_KEY }}
        run: |
          echo "SYNCPODS_SUPABASE_URL=$SUPABASE_URL" >> local.properties
          echo "SYNCPODS_SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> local.properties
          echo "GOOGLE_WEB_CLIENT_ID=$GWC_ID" >> local.properties
          echo "SYNCPODS_PROD_SUPABASE_URL=$PROD_URL" >> local.properties
          echo "SYNCPODS_PROD_SUPABASE_ANON_KEY=$PROD_KEY" >> local.properties

      - name: Run Android unit tests
        run: ./gradlew :composeApp:testDebugUnitTest

  ios-compile:
    name: iOS Compile Check
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('mobile/gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Write local.properties
        env:
          SUPABASE_URL: ${{ secrets.SYNCPODS_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SYNCPODS_SUPABASE_ANON_KEY }}
          GWC_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          PROD_URL: ${{ secrets.SYNCPODS_PROD_SUPABASE_URL }}
          PROD_KEY: ${{ secrets.SYNCPODS_PROD_SUPABASE_ANON_KEY }}
        run: |
          echo "SYNCPODS_SUPABASE_URL=$SUPABASE_URL" >> local.properties
          echo "SYNCPODS_SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> local.properties
          echo "GOOGLE_WEB_CLIENT_ID=$GWC_ID" >> local.properties
          echo "SYNCPODS_PROD_SUPABASE_URL=$PROD_URL" >> local.properties
          echo "SYNCPODS_PROD_SUPABASE_ANON_KEY=$PROD_KEY" >> local.properties

      # Kotlin/Native 2.3.0 passes -fObjC to the linker, which Xcode 15.3+ ld-prime
      # rejects. Compile-only checks catch real errors (mixed supertypes, missing
      # symbols) without invoking the linker. Common-code tests run via Android job.
      - name: Compile iOS sources
        run: ./gradlew :composeApp:compileKotlinIosSimulatorArm64

      - name: Compile iOS test sources
        run: ./gradlew :composeApp:compileTestKotlinIosSimulatorArm64
