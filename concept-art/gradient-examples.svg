<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <!-- Original-ish: green to teal -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>

    <!-- Warm: lime to cyan -->
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a3e635"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- Cool: teal to indigo (bridges toward your violet UI) -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>

    <!-- Bold: emerald to blue -->
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>

    <!-- Soft: sage to slate -->
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>

    <!-- Vivid: yellow-green to teal -->
    <linearGradient id="g6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#84cc16"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#1e1b4b"/>

  <!-- Row 1 -->
  <rect x="20" y="20" width="260" height="80" rx="40" fill="url(#g1)"/>
  <text x="150" y="67" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" opacity="0.8">#4ade80 → #0d9488  (green → teal)</text>

  <rect x="320" y="20" width="260" height="80" rx="40" fill="url(#g2)"/>
  <text x="450" y="67" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" opacity="0.8">#a3e635 → #06b6d4  (lime → cyan)</text>

  <!-- Row 2 -->
  <rect x="20" y="120" width="260" height="80" rx="40" fill="url(#g3)"/>
  <text x="150" y="167" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" opacity="0.8">#2dd4bf → #6366f1  (teal → indigo)</text>

  <rect x="320" y="120" width="260" height="80" rx="40" fill="url(#g4)"/>
  <text x="450" y="167" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" opacity="0.8">#10b981 → #3b82f6  (emerald → blue)</text>

  <!-- Row 3 -->
  <rect x="20" y="220" width="260" height="80" rx="40" fill="url(#g5)"/>
  <text x="150" y="267" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" opacity="0.8">#86efac → #94a3b8  (sage → slate)</text>

  <rect x="320" y="220" width="260" height="80" rx="40" fill="url(#g6)"/>
  <text x="450" y="267" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" opacity="0.8">#84cc16 → #0891b2  (yellow-green → teal)</text>

  <!-- Legend -->
  <text x="300" y="360" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#a5b4fc">shown on violet background (your app's primary color)</text>
</svg>
