<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 106" width="370" height="106">
  <defs>
    <!-- Light circle gradient (left, play button) -->
    <radialGradient id="lightGrad2" cx="38%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#AADE46"/>
      <stop offset="100%" stop-color="#72BC2C"/>
    </radialGradient>
    <!-- Dark circle gradient (right, sync icon) -->
    <radialGradient id="darkGrad2" cx="38%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#56BA2E"/>
      <stop offset="100%" stop-color="#318418"/>
    </radialGradient>
  </defs>

  <!-- White background -->
  <rect width="370" height="106" fill="white"/>

  <!-- Dark circle (right, drawn first) -->
  <circle cx="124" cy="53" r="44" fill="url(#darkGrad2)"/>

  <!-- Light circle (left, drawn on top) -->
  <circle cx="52" cy="53" r="44" fill="url(#lightGrad2)"/>

  <!-- Play triangle centered at (52, 53) -->
  <polygon points="41,38 69,53 41,68" fill="white"/>

  <!-- Sync icon centered at (124, 53), scale=1.97 -->
  <g transform="translate(124,53) scale(1.97) translate(-12,-12)" fill="white">
    <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
  </g>

  <!-- "syncpods" text, vertically centered with pill -->
  <text x="181" y="53"
        dominant-baseline="middle"
        text-anchor="start"
        font-family="'Nunito', 'Poppins', 'Montserrat', sans-serif"
        font-size="38" font-weight="600" letter-spacing="-0.3">
    <tspan fill="#5AAD2C">sync</tspan><tspan fill="#44AABB">pods</tspan>
  </text>
</svg>
