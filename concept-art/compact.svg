<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 258 192" width="258" height="192">
  <defs>
    <!-- Light circle gradient (left, play button) -->
    <radialGradient id="lightGrad3" cx="38%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#AADE46"/>
      <stop offset="100%" stop-color="#72BC2C"/>
    </radialGradient>
    <!-- Dark circle gradient (right, sync icon) -->
    <radialGradient id="darkGrad3" cx="38%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#56BA2E"/>
      <stop offset="100%" stop-color="#318418"/>
    </radialGradient>
  </defs>

  <!-- Light gray background (matching reference) -->
  <rect width="258" height="192" fill="#F6F6F6"/>

  <!-- Dark circle (right, drawn first) -->
  <!-- Centers: left=92, right=167 (distance=75, overlap=25px / 25% of diameter) -->
  <circle cx="167" cy="88" r="50" fill="url(#darkGrad3)"/>

  <!-- Light circle (left, drawn on top) -->
  <circle cx="92" cy="88" r="50" fill="url(#lightGrad3)"/>

  <!-- Play triangle centered at (92, 88) -->
  <polygon points="81,72 110,88 81,104" fill="white"/>

  <!-- Sync icon centered at (167, 88), scale=2.25 -->
  <g transform="translate(167,88) scale(2.25) translate(-12,-12)" fill="white">
    <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
  </g>

  <!-- "syncpods" text, centered below pill -->
  <text x="130" y="166"
        text-anchor="middle"
        font-family="'Nunito', 'Poppins', 'Montserrat', sans-serif"
        font-size="24" font-weight="600" letter-spacing="-0.3">
    <tspan fill="#5AAD2C">sync</tspan><tspan fill="#44AABB">pods</tspan>
  </text>
</svg>
